<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 596" font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
<defs><marker id="ctl" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#89b4fa"/></marker></defs>
<defs><marker id="note" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#a6e3a1"/></marker></defs>
<rect x="0" y="0" width="1000" height="596" rx="14" fill="#181825"/>
<text x="500.0" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#cdd6f4">introdus — what lives where</text>
<text x="500.0" y="63" text-anchor="middle" font-size="13" fill="#9399b2">dev machine  →  container host  →  dev container (any two can collapse onto one box)</text>
<rect x="20" y="86" width="225" height="380" rx="12" fill="#1e1e2e" stroke="#89b4fa" stroke-width="1.5"/>
<rect x="20" y="86" width="225" height="4" rx="2" fill="#89b4fa"/>
<text x="38" y="120" font-size="17" font-weight="700" fill="#89b4fa">Dev machine</text>
<text x="38" y="140" font-size="12" fill="#9399b2">the laptop you sit at</text>
<rect x="36" y="164" width="193" height="62" rx="8" fill="#262637" stroke="#45475a" stroke-width="1"/>
<text x="48" y="190" font-size="14" font-weight="700" fill="#cdd6f4">VS Code</text>
<text x="48" y="210" font-size="12" fill="#9399b2">Remote-SSH → attach</text>
<rect x="36" y="236" width="193" height="62" rx="8" fill="#262637" stroke="#45475a" stroke-width="1"/>
<text x="48" y="262" font-size="14" font-weight="700" fill="#cdd6f4">notify-listen</text>
<text x="48" y="282" font-size="12" fill="#9399b2">renders popup + sound</text>
<rect x="36" y="308" width="193" height="62" rx="8" fill="#262637" stroke="#45475a" stroke-width="1"/>
<text x="48" y="334" font-size="14" font-weight="700" fill="#cdd6f4">send-files</text>
<text x="48" y="354" font-size="12" fill="#9399b2">push files into a container</text>
<rect x="36" y="380" width="193" height="62" rx="8" fill="#262637" stroke="#45475a" stroke-width="1"/>
<text x="48" y="406" font-size="14" font-weight="700" fill="#cdd6f4">ssh -R tunnel</text>
<text x="48" y="426" font-size="12" fill="#9399b2">autossh, self-healing</text>
<rect x="387.5" y="86" width="225" height="380" rx="12" fill="#1e1e2e" stroke="#89dceb" stroke-width="1.5"/>
<rect x="387.5" y="86" width="225" height="4" rx="2" fill="#89dceb"/>
<text x="405.5" y="120" font-size="17" font-weight="700" fill="#89dceb">Container host</text>
<text x="405.5" y="140" font-size="12" fill="#9399b2">a remote box or the same laptop</text>
<rect x="403.5" y="164" width="193" height="62" rx="8" fill="#262637" stroke="#45475a" stroke-width="1"/>
<text x="415.5" y="190" font-size="14" font-weight="700" fill="#cdd6f4">introdus</text>
<text x="415.5" y="210" font-size="12" fill="#9399b2">launch + control panel (tmux)</text>
<rect x="403.5" y="236" width="193" height="62" rx="8" fill="#262637" stroke="#45475a" stroke-width="1"/>
<text x="415.5" y="262" font-size="14" font-weight="700" fill="#cdd6f4">rootless podman</text>
<text x="415.5" y="282" font-size="12" fill="#9399b2">no host firewall, no sudo</text>
<rect x="403.5" y="308" width="193" height="62" rx="8" fill="#262637" stroke="#45475a" stroke-width="1"/>
<text x="415.5" y="334" font-size="14" font-weight="700" fill="#cdd6f4">notify-host</text>
<text x="415.5" y="354" font-size="12" fill="#9399b2">detached relay service</text>
<rect x="403.5" y="380" width="193" height="62" rx="8" fill="#262637" stroke="#45475a" stroke-width="1"/>
<text x="415.5" y="406" font-size="14" font-weight="700" fill="#cdd6f4">deploy key</text>
<text x="415.5" y="426" font-size="12" fill="#9399b2">read-only, one repo</text>
<rect x="755.0" y="86" width="225" height="380" rx="12" fill="#1e1e2e" stroke="#a6e3a1" stroke-width="1.5"/>
<rect x="755.0" y="86" width="225" height="4" rx="2" fill="#a6e3a1"/>
<text x="773.0" y="120" font-size="17" font-weight="700" fill="#a6e3a1">Dev container</text>
<text x="773.0" y="140" font-size="12" fill="#9399b2">repo + agents, egress-filtered</text>
<rect x="771.0" y="164" width="193" height="62" rx="8" fill="#262637" stroke="#45475a" stroke-width="1"/>
<text x="783.0" y="190" font-size="14" font-weight="700" fill="#cdd6f4">firewall-entrypoint</text>
<text x="783.0" y="210" font-size="12" fill="#9399b2">PID 1: nft deny + proxy</text>
<rect x="771.0" y="236" width="193" height="62" rx="8" fill="#262637" stroke="#45475a" stroke-width="1"/>
<text x="783.0" y="262" font-size="14" font-weight="700" fill="#cdd6f4">setup.sh</text>
<text x="783.0" y="282" font-size="12" fill="#9399b2">clones repo as non-root dev</text>
<rect x="771.0" y="308" width="193" height="62" rx="8" fill="#262637" stroke="#45475a" stroke-width="1"/>
<text x="783.0" y="334" font-size="14" font-weight="700" fill="#cdd6f4">coding agents</text>
<text x="783.0" y="354" font-size="12" fill="#9399b2">Claude, Codex, …</text>
<rect x="771.0" y="380" width="193" height="62" rx="8" fill="#262637" stroke="#45475a" stroke-width="1"/>
<text x="783.0" y="406" font-size="14" font-weight="700" fill="#cdd6f4">rc-notify</text>
<text x="783.0" y="426" font-size="12" fill="#9399b2">task done / awaiting input</text>
<line x1="285.0" y1="236" x2="347.5" y2="236" stroke="#89b4fa" stroke-width="2.25" marker-end="url(#ctl)"/>
<text x="316.2" y="225" text-anchor="middle" font-size="11" fill="#89b4fa" font-weight="600">SSH</text>
<line x1="652.5" y1="236" x2="715.0" y2="236" stroke="#89b4fa" stroke-width="2.25" marker-end="url(#ctl)"/>
<text x="683.8" y="225" text-anchor="middle" font-size="11" fill="#89b4fa" font-weight="600">exec</text>
<line x1="715.0" y1="336" x2="652.5" y2="336" stroke="#a6e3a1" stroke-width="2.25" marker-end="url(#note)"/>
<text x="683.8" y="325" text-anchor="middle" font-size="11" fill="#a6e3a1" font-weight="600">FIFO</text>
<line x1="347.5" y1="336" x2="285.0" y2="336" stroke="#a6e3a1" stroke-width="2.25" marker-end="url(#note)"/>
<text x="316.2" y="325" text-anchor="middle" font-size="11" fill="#a6e3a1" font-weight="600">ssh -R</text>
<text x="500.0" y="500" text-anchor="middle" font-size="12.5" fill="#9399b2"><tspan fill="#a6e3a1" font-weight="700">Egress</tspan> is filtered inside the container — the workload reaches only allowlisted hosts, through a proxy it cannot disable.</text>
<line x1="260" y1="530" x2="294" y2="530" stroke="#89b4fa" stroke-width="2.25" marker-end="url(#ctl)"/>
<text x="306" y="534" font-size="12.5" fill="#cdd6f4"><tspan font-weight="700">Control</tspan> — drive agents from your laptop</text>
<line x1="294" y1="556" x2="260" y2="556" stroke="#a6e3a1" stroke-width="2.25" marker-end="url(#note)"/>
<text x="306" y="560" font-size="12.5" fill="#cdd6f4"><tspan font-weight="700">Notifications</tspan> — task done / awaiting input → popup + sound</text>
</svg>
