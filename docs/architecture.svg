<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 606" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="606" fill="#ffffff"/>
  <text x="480" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">introdus — architecture</text>
  <text x="480" y="56" text-anchor="middle" font-size="13" fill="#64748b">dev machine  →  remote container host  →  hardened dev container</text>

  <!-- ===== Tier 1: dev machine ===== -->
  <rect x="24" y="84" width="270" height="380" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="159" y="112" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">Your dev machine (laptop)</text>

  <rect x="48" y="132" width="222" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="159" y="156" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">VS Code — Remote-SSH</text>
  <text x="159" y="176" text-anchor="middle" font-size="11.5" fill="#64748b">attach to running container</text>

  <rect x="48" y="204" width="222" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="159" y="228" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">introdus notify-listen</text>
  <text x="159" y="248" text-anchor="middle" font-size="11.5" fill="#64748b">renders popup + sound</text>

  <rect x="48" y="276" width="222" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="159" y="303" text-anchor="middle" font-size="12.5" fill="#0f172a">ssh -R reverse tunnel</text>

  <text x="159" y="358" text-anchor="middle" font-size="11.5" fill="#94a3b8">set up manually</text>
  <text x="159" y="376" text-anchor="middle" font-size="11.5" fill="#94a3b8">(autossh for self-healing)</text>

  <!-- ===== Tier 2: remote host ===== -->
  <rect x="345" y="84" width="270" height="380" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="480" y="112" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">Remote container host</text>
  <text x="480" y="129" text-anchor="middle" font-size="11" fill="#94a3b8">KVM / VPS — or the same laptop</text>

  <rect x="369" y="146" width="222" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="480" y="173" text-anchor="middle" font-size="12.5" fill="#0f172a">podman (rootless) + egress filter</text>

  <rect x="369" y="204" width="222" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="480" y="228" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">introdus notify-host</text>
  <text x="480" y="248" text-anchor="middle" font-size="11.5" fill="#64748b">reads FIFO, renders or forwards</text>

  <rect x="369" y="276" width="222" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="480" y="303" text-anchor="middle" font-size="12.5" fill="#0f172a">forward → ssh -R tunnel</text>

  <text x="480" y="358" text-anchor="middle" font-size="11.5" fill="#94a3b8">introdus install (one-time)</text>
  <text x="480" y="376" text-anchor="middle" font-size="11.5" fill="#94a3b8">introdus (per project)</text>

  <!-- ===== Tier 3: container ===== -->
  <rect x="666" y="84" width="270" height="380" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="801" y="112" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">Dev container</text>
  <text x="801" y="129" text-anchor="middle" font-size="11" fill="#94a3b8">network-hardened, your code only</text>

  <rect x="690" y="146" width="222" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="801" y="173" text-anchor="middle" font-size="12.5" fill="#0f172a">your repo clone</text>

  <rect x="690" y="204" width="222" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="801" y="228" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Claude Code</text>
  <text x="801" y="248" text-anchor="middle" font-size="11.5" fill="#64748b">remote-control + Stop hook</text>

  <rect x="690" y="276" width="222" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="801" y="303" text-anchor="middle" font-size="12.5" fill="#0f172a">rc-notify (task done / waiting)</text>

  <!-- ===== Flow: control (left -> right), top ===== -->
  <line x1="294" y1="160" x2="345" y2="160" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrBlue)"/>
  <line x1="615" y1="168" x2="666" y2="168" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrBlue)"/>
  <text x="320" y="150" text-anchor="middle" font-size="10.5" fill="#2563eb">SSH</text>
  <text x="640" y="158" text-anchor="middle" font-size="10.5" fill="#2563eb">exec</text>

  <!-- ===== Flow: notifications (right -> left), bottom ===== -->
  <line x1="666" y1="298" x2="615" y2="298" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrGreen)"/>
  <text x="640" y="290" text-anchor="middle" font-size="10.5" fill="#16a34a">FIFO</text>
  <line x1="345" y1="298" x2="294" y2="298" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrGreen)"/>
  <text x="319" y="290" text-anchor="middle" font-size="10.5" fill="#16a34a">tunnel</text>

  <!-- legend -->
  <rect x="222" y="498" width="516" height="74" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>

  <line x1="252" y1="526" x2="288" y2="526" stroke="#2563eb" stroke-width="2.4" marker-end="url(#arrBlue)"/>
  <text x="306" y="530" font-size="12.5" fill="#475569"><tspan font-weight="700" fill="#334155">Control</tspan>: Drive Claude from your laptop</text>

  <line x1="252" y1="554" x2="288" y2="554" stroke="#16a34a" stroke-width="2.4" marker-start="url(#arrGreen)"/>
  <text x="306" y="558" font-size="12.5" fill="#475569"><tspan font-weight="700" fill="#334155">Notifications</tspan>: Task done / Waiting for input → Popup + Sound</text>
</svg>
