# remote-control-harness egress proxy.
#
# A loopback-only HTTP forward proxy with a DEFAULT-DENY hostname allowlist.
# The in-container nft filter (firewall-entrypoint.sh) lets only THIS proxy's
# uid reach the internet; the workload (user `dev`) has no direct egress, so its
# only path out is through here — and this proxy only permits requests whose
# hostname matches the allowlist. The allowlist file is (re)generated on every
# container start from WHITELIST_HOSTS in .env (see firewall-entrypoint.sh).

# Drop privileges to the dedicated egress user. Even though nothing here needs
# root, running as rcproxy is what makes the nft `meta skuid rcproxy accept`
# rule meaningful: the proxy's outbound sockets are owned by this uid, the
# workload's are not.
User rcproxy
Group rcproxy

# Loopback only. The workload reaches us via http://127.0.0.1:8888 (baked into
# HTTP(S)_PROXY / apt / ssh ProxyCommand). Never bound to a routable address.
Port 8888
Listen 127.0.0.1

# Only accept clients from loopback (the workload). Without an Allow line
# tinyproxy denies everyone.
Allow 127.0.0.1

# Hostname allowlist. FilterDefaultDeny => only hosts matching a line in the
# filter file are permitted; everything else is refused. Extended POSIX regex,
# case-insensitive. The filter applies to both proxied GETs and CONNECTs, so a
# raw `CONNECT evil.com:443` is rejected even though the firewall would let the
# proxy reach it.
Filter "/etc/tinyproxy/egress-allowlist.txt"
FilterDefaultDeny Yes
FilterExtended On
FilterCaseSensitive Off

# CONNECT (TLS tunnels): 443 for HTTPS, 563 kept for parity, and 22 so the
# git-over-SSH deploy-key clone can tunnel via `ssh ProxyCommand`. Any other
# CONNECT port is refused, so the proxy can't be used to tunnel arbitrary TCP.
ConnectPort 443
ConnectPort 563
ConnectPort 22

Timeout 600
MaxClients 100

# LogLevel Notice captures denials ("Proxying refused on filtered domain ...")
# without the per-request noise of Connect/Info. The entrypoint runs tinyproxy
# with -d and redirects its console output to /var/log/tinyproxy/tinyproxy.log
# (world-readable), which `egress-log` parses — so no LogFile/PidFile here.
LogLevel Notice
